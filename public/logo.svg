<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="50%" stop-color="#f8d0dc"/>
      <stop offset="100%" stop-color="#fce4ec"/>
    </linearGradient>
  </defs>

  <!-- Soft pink background -->
  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- Top: BHUVIKA STUDIO -->
  <text x="300" y="95" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="400" fill="#1a1a1a" letter-spacing="14">BHUVIKA STUDIO</text>
  <line x1="130" y1="110" x2="470" y2="110" stroke="#b8868f" stroke-width="0.5" opacity="0.5"/>

  <!-- Main Monogram Area -->
  <!-- Outer thin circle -->
  <circle cx="300" cy="330" r="175" fill="none" stroke="#b8868f" stroke-width="0.6" opacity="0.35"/>

  <!-- Large B -->
  <text x="270" y="380" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="200" font-weight="700" fill="#1a1a1a" opacity="0.88">B</text>

  <!-- Flowing S interlocking with B -->
  <text x="360" y="400" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="140" font-weight="400" fill="#1a1a1a" font-style="italic" opacity="0.55">S</text>

  <!-- Small BHUVIKA STUDIO inside monogram -->
  <line x1="215" y1="415" x2="385" y2="415" stroke="#1a1a1a" stroke-width="0.4" opacity="0.25"/>
  <text x="300" y="432" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="400" fill="#1a1a1a" letter-spacing="7" opacity="0.6">BHUVIKA STUDIO</text>
  <line x1="215" y1="440" x2="385" y2="440" stroke="#1a1a1a" stroke-width="0.4" opacity="0.25"/>

  <!-- Bottom tagline -->
  <text x="300" y="560" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="400" fill="#8b6070" letter-spacing="8" opacity="0.5">ETHNIC FASHION BOUTIQUE</text>
</svg>
