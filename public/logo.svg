<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" fill="none">
  <defs>
    <linearGradient id="gold-main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BF953F"/>
      <stop offset="25%" stop-color="#FCF6BA"/>
      <stop offset="50%" stop-color="#B38728"/>
      <stop offset="75%" stop-color="#FBF5B7"/>
      <stop offset="100%" stop-color="#AA771C"/>
    </linearGradient>
  </defs>

  <!-- Dark circle background -->
  <circle cx="40" cy="40" r="38" fill="#0a0a0a"/>
  <!-- Gold ring -->
  <circle cx="40" cy="40" r="35" fill="none" stroke="url(#gold-main)" stroke-width="1.5"/>
  <!-- Inner thin ring -->
  <circle cx="40" cy="40" r="30" fill="none" stroke="url(#gold-main)" stroke-width="0.4" opacity="0.5"/>
  <!-- Stylish B -->
  <text x="40" y="51" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="url(#gold-main)">B</text>

  <!-- BHUVIKA text -->
  <text x="95" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#0a0a0a" letter-spacing="5">BHUVIKA</text>
  <!-- Gold underline -->
  <rect x="95" y="46" width="200" height="1.2" fill="url(#gold-main)" opacity="0.6" rx="1"/>
  <!-- STUDIO -->
  <text x="95" y="65" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="300" fill="#888888" letter-spacing="12">STUDIO</text>
</svg>
