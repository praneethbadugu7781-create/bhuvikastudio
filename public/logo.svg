<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <defs>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8728a"/>
      <stop offset="50%" stop-color="#c94b6a"/>
      <stop offset="100%" stop-color="#a83256"/>
    </linearGradient>
    <linearGradient id="pink-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4a5b8"/>
      <stop offset="100%" stop-color="#e8728a"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d1520"/>
      <stop offset="100%" stop-color="#3d1f2e"/>
    </linearGradient>
  </defs>

  <!-- BS Monogram Circle -->
  <circle cx="40" cy="40" r="37" fill="url(#pink)"/>
  <circle cx="40" cy="40" r="33.5" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.35"/>

  <!-- B letter -->
  <text x="33" y="48" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="30" font-weight="700" fill="#fff" opacity="0.95">B</text>
  <!-- S letter overlapping -->
  <text x="50" y="52" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="26" font-weight="400" fill="#ffd6e0" font-style="italic" opacity="0.9">S</text>

  <!-- Brand Name -->
  <text x="95" y="34" font-family="Georgia, 'Playfair Display', serif" font-size="26" font-weight="700" fill="url(#txt)" letter-spacing="5">BHUVIKA</text>
  <!-- Pink line -->
  <rect x="95" y="42" width="185" height="1.5" fill="url(#pink)" opacity="0.5" rx="1"/>
  <!-- STUDIO text -->
  <text x="95" y="62" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="url(#pink)" letter-spacing="13">STUDIO</text>
</svg>
